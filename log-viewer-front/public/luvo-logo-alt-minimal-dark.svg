<svg width="720" height="200" viewBox="0 0 720 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="luvoAltDarkTitle luvoAltDarkDesc">
  <title id="luvoAltDarkTitle">LuVo minimal logo dark</title>
  <desc id="luvoAltDarkDesc">Minimal monoline dark logo for LuVo Log Viewer</desc>
  <defs>
    <linearGradient id="monoStrokeDark" x1="30" y1="28" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#155C8E"/>
      <stop offset="1" stop-color="#0D2E48"/>
    </linearGradient>
    <linearGradient id="monoAccentDark" x1="54" y1="124" x2="136" y2="124" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#C6FF4D"/>
      <stop offset="1" stop-color="#F0FF82"/>
    </linearGradient>
  </defs>

  <rect x="24" y="24" width="156" height="156" rx="34" stroke="url(#monoStrokeDark)" stroke-width="10"/>
  <rect x="52" y="56" width="100" height="10" rx="5" fill="#155C8E"/>
  <rect x="52" y="82" width="78" height="10" rx="5" fill="#1E6FA8"/>
  <rect x="52" y="108" width="56" height="10" rx="5" fill="#2787C8"/>
  <circle cx="60" cy="138" r="8" fill="url(#monoAccentDark)"/>
  <rect x="74" y="133" width="62" height="10" rx="5" fill="url(#monoAccentDark)"/>

  <text x="220" y="106" font-family="Outfit, Segoe UI, sans-serif" font-size="72" font-weight="700" fill="url(#monoStrokeDark)" letter-spacing="1.5">LUVO</text>
  <text x="224" y="138" font-family="Outfit, Segoe UI, sans-serif" font-size="22" font-weight="500" fill="#356384" letter-spacing="4">LOG VIEWER</text>
</svg>
